<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Japanese Flashcards</title>
    <meta name="description" content="Offline flashcards and quizzes for learning Japanese." />

    <!-- PWA -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#28384e" />

    <!-- iPhone home-screen install -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="日本語" />
    <link rel="apple-touch-icon" href="./icons/icon-180.png" />

    <link rel="icon" type="image/png" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <noscript>This app needs JavaScript enabled.</noscript>
    </div>

    <script type="module" src="./app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
